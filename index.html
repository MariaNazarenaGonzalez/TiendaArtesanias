<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Tienda Artesanal</title>
  <style>
    body {
      font-family: Arial;
      background: #f8f1e7;
      text-align: center;
    }
    .producto {
      border: 1px solid #ccc;
      padding: 10px;
      margin: 20px;
      display: inline-block;
      background: white;
      border-radius: 10px;
    }
    img {
      width: 200px;
      border-radius: 10px;
    }
    button {
      background: #a86b3d;
      color: white;
      border: none;
      padding: 10px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h1>🧶 Tienda de Artesanías</h1>

<div class="producto">
  <img src="TiendaArtesanias/Imagenes/Captura1.png" alt="Desc. ponchos">
  <h2>Producto 1</h2>
  <p>$500</p>
  <button>Comprar</button>
</div>

<div class="producto">
  <img src="TiendaArtesanias/Imagenes/Captura2.png" alt="Desc. ponchos">
  <h2>Producto 2</h2>
  <p>$800</p>
  <button>Comprar</button>
</div>

</body>
</html>
