<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administración | Telar y Raíz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Nunito:wght@300;400;600&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        serif: ['Lora', 'serif'],
                        sans: ['Nunito', 'sans-serif'],
                    },
                    colors: {
                        tierra: {
                            100: '#F5EBE6',
                            300: '#D4B8A3',
                            500: '#A67C52',
                            700: '#734A26',
                            900: '#402411',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="font-sans bg-stone-100 text-stone-800 min-h-screen">
    <header class="bg-white shadow-sm">
        <div class="max-w-6xl mx-auto px-4 py-5 flex justify-between items-center">
            <h1 class="font-serif text-2xl md:text-3xl font-bold text-tierra-700">Panel de Administración</h1>
            <a href="index.html" class="bg-tierra-700 text-white px-4 py-2 rounded-lg hover:bg-tierra-900 transition">Volver a la tienda</a>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-10">
        <section id="login-section" class="max-w-md mx-auto bg-white rounded-xl shadow-md p-6">
            <h2 class="font-serif text-2xl font-bold mb-4">Ingreso de administración</h2>
            <p class="text-sm text-stone-600 mb-4">Ingresá la contraseña para acceder al panel.</p>
            <form id="form-login" class="space-y-4">
                <div>
                   <label for="admin-password" class="block text-sm font-semibold mb-1">Contraseña</label>
                    <input id="admin-password" name="adminPassword" type="password" required class="w-full border border-stone-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-tierra-300">
                <button type="submit" class="w-full bg-tierra-700 text-white font-bold py-3 rounded-lg hover:bg-tierra-900 transition">
                    Ingresar
                </button>
            </form>
            <p id="mensaje-login" class="text-sm mt-4"></p>
        </section>
       <section id="admin-section" class="hidden grid grid-cols-1 lg:grid-cols-3 gap-8">
            <section class="lg:col-span-1 bg-white rounded-xl shadow-md p-6 h-fit">
                <h2 class="font-serif text-2xl font-bold mb-4">Cargar producto nuevo</h2>
                <form id="form-producto" class="space-y-4">
                    <div>
                        <label for="nombre" class="block text-sm font-semibold mb-1">Nombre</label>
                        <input id="nombre" name="nombre" type="text" required class="w-full border border-stone-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-tierra-300">
                    </div>
                    <div>
                        <label for="precio" class="block text-sm font-semibold mb-1">Precio</label>
                        <input id="precio" name="precio" type="text" placeholder="$85.000" required class="w-full border border-stone-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-tierra-300">
                    </div>
                    <div>
                        <label for="descripcion" class="block text-sm font-semibold mb-1">Descripción</label>
                        <textarea id="descripcion" name="descripcion" rows="4" required class="w-full border border-stone-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-tierra-300"></textarea>
                    </div>
                    <div>
                        <label for="imagen" class="block text-sm font-semibold mb-1">Imagen (.png/.jpg)</label>
                        <input id="imagen" name="imagen" type="file" accept="image/png, image/jpeg, image/webp" required class="w-full border border-stone-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-tierra-300">
                    </div>
                    <button type="submit" class="w-full bg-tierra-700 text-white font-bold py-3 rounded-lg hover:bg-tierra-900 transition">
                        Guardar producto
                    </button>
                </form>
                <p id="mensaje" class="text-sm mt-4"></p>
            </section>

            <section class="lg:col-span-2 space-y-8">
                <div class="bg-white rounded-xl shadow-md p-6">
                    <div class="flex justify-between items-center gap-4 mb-4">
                        <h2 class="font-serif text-2xl font-bold">Productos cargados</h2>
                        <button id="btn-salir" class="bg-stone-200 text-stone-800 px-4 py-2 rounded-lg font-semibold hover:bg-stone-300 transition">Cerrar sesión</button>
                    </div>
                    <div id="lista-productos" class="space-y-4"></div>
                </div>

                <div class="bg-white rounded-xl shadow-md p-6">
                    <h2 class="font-serif text-2xl font-bold mb-4">Cambiar contraseña</h2>
                    <form id="form-password" class="space-y-4">
                        <div>
                            <label for="password-actual" class="block text-sm font-semibold mb-1">Contraseña actual</label>
                            <input id="password-actual" name="passwordActual" type="password" required class="w-full border border-stone-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-tierra-300">
                        </div>
                        <div>
                            <label for="password-nueva" class="block text-sm font-semibold mb-1">Nueva contraseña</label>
                            <input id="password-nueva" name="passwordNueva" type="password" minlength="4" required class="w-full border border-stone-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-tierra-300">
                        </div>
                        <button type="submit" class="bg-tierra-700 text-white px-5 py-3 rounded-lg font-bold hover:bg-tierra-900 transition">Actualizar contraseña</button>
                    </form>
                    <p id="mensaje-password" class="text-sm mt-4"></p>
                </div>
            </section>
        </section>
    </main>

    <script src="js/productos-db.js"></script>
    <script>
        const CLAVE_PASSWORD = 'adminPassword';
        const CLAVE_SESION = 'adminActiva';
        const PASSWORD_INICIAL = '12345';

        function obtenerPasswordGuardada() {
            return localStorage.getItem(CLAVE_PASSWORD) || PASSWORD_INICIAL;
        }
        function mostrarMensajeLogin(texto, esError = false) {
            const mensaje = document.getElementById('mensaje-login');
            mensaje.textContent = texto;
            mensaje.className = esError ? 'text-sm mt-4 text-red-600' : 'text-sm mt-4 text-green-700';
        }

        function mostrarMensajePassword(texto, esError = false) {
            const mensaje = document.getElementById('mensaje-password');
            mensaje.textContent = texto;
            mensaje.className = esError ? 'text-sm mt-4 text-red-600' : 'text-sm mt-4 text-green-700';
        }

        function actualizarVistaAutenticacion() {
            const logueado = localStorage.getItem(CLAVE_SESION) === 'true';
            const loginSection = document.getElementById('login-section');
            const adminSection = document.getElementById('admin-section');

            if (logueado) {
                loginSection.classList.add('hidden');
                adminSection.classList.remove('hidden');
                renderizarLista();
                return;
            }

            adminSection.classList.add('hidden');
            loginSection.classList.remove('hidden');
        }


        function mostrarMensaje(texto, esError = false) {
            const mensaje = document.getElementById('mensaje');
            mensaje.textContent = texto;
            mensaje.className = esError ? 'text-sm mt-4 text-red-600' : 'text-sm mt-4 text-green-700';
        }

        async function renderizarLista() {
            const lista = document.getElementById('lista-productos');
            const productos = await window.ProductosDB.listarProductos();
            lista.innerHTML = '';

            if (!productos.length) {
                lista.innerHTML = '<p class="text-stone-500">No hay productos cargados.</p>';
                return;
            }

            productos.forEach((producto) => {
                const item = document.createElement('article');
                item.className = 'border border-stone-200 rounded-lg p-4 flex flex-col md:flex-row gap-4 md:items-start';
                item.innerHTML = `
                    <img src="${producto.imagen}" alt="${producto.nombre}" class="w-full md:w-32 h-32 object-cover rounded-md">
                    <div class="flex-grow">
                        <h3 class="font-serif text-xl font-bold text-stone-800">${producto.nombre}</h3>
                        <p class="text-tierra-700 font-bold mt-1">${producto.precio}</p>
                        <p class="text-sm text-stone-600 mt-2">${producto.descripcion}</p>
                    </div>
                    <button data-id="${producto.id}" class="eliminar bg-red-100 text-red-700 font-semibold px-4 py-2 rounded-lg hover:bg-red-200 transition h-fit">
                        Eliminar
                    </button>
                `;
                lista.appendChild(item);
            });

            document.querySelectorAll('.eliminar').forEach((btn) => {
                btn.addEventListener('click', (event) => {
                    const idAEliminar = Number(event.currentTarget.dataset.id);
                    eliminarProducto(idAEliminar);
                });
            });
        }

        function leerArchivoComoDataURL(archivo) {
            return new Promise((resolve, reject) => {
                const lector = new FileReader();
                lector.onload = () => resolve(lector.result);
                lector.onerror = () => reject(new Error('No se pudo leer la imagen.'));
                lector.readAsDataURL(archivo);
            });
        }

        async function agregarProducto(event) {
            event.preventDefault();

            try {
                const form = event.currentTarget;
                const archivoImagen = form.imagen.files[0];
                if (!archivoImagen) {
                    mostrarMensaje('Seleccioná una imagen para continuar.', true);
                    return;
                }

                const imagenDataUrl = await leerArchivoComoDataURL(archivoImagen);

                const nuevoProducto = {
                    nombre: form.nombre.value.trim(),
                    precio: form.precio.value.trim(),
                    descripcion: form.descripcion.value.trim(),
                    imagen: imagenDataUrl
                };

                if (!nuevoProducto.nombre || !nuevoProducto.precio || !nuevoProducto.descripcion || !nuevoProducto.imagen) {
                    mostrarMensaje('Completá todos los campos antes de guardar.', true);
                    return;
                }

                await window.ProductosDB.agregarProducto(nuevoProducto);
                form.reset();
                await renderizarLista();
                mostrarMensaje('Producto agregado correctamente.');
            } catch (error) {
                mostrarMensaje('No se pudo guardar el producto. Probá nuevamente.', true);
            }
        }

        async function eliminarProducto(idProducto) {
            try {
                await window.ProductosDB.eliminarProducto(idProducto);
                await renderizarLista();
                mostrarMensaje('Producto eliminado correctamente.');
            } catch (error) {
                mostrarMensaje('No se pudo eliminar el producto.', true);
            }
        }
        function iniciarSesion(event) {
            event.preventDefault();
            const form = event.currentTarget;
            const passwordIngresada = form.adminPassword.value;

            if (passwordIngresada !== obtenerPasswordGuardada()) {
                mostrarMensajeLogin('Contraseña incorrecta.', true);
                return;
            }

            localStorage.setItem(CLAVE_SESION, 'true');
            form.reset();
            mostrarMensajeLogin('Acceso concedido.');
            actualizarVistaAutenticacion();
        }

        function cerrarSesion() {
            localStorage.removeItem(CLAVE_SESION);
            mostrarMensaje('');
            mostrarMensajePassword('');
            actualizarVistaAutenticacion();
        }

        function cambiarPassword(event) {
            event.preventDefault();
            const form = event.currentTarget;
            const actual = form.passwordActual.value;
            const nueva = form.passwordNueva.value.trim();

            if (actual !== obtenerPasswordGuardada()) {
                mostrarMensajePassword('La contraseña actual no coincide.', true);
                return;
            }

            if (nueva.length < 4) {
                mostrarMensajePassword('La nueva contraseña debe tener al menos 4 caracteres.', true);
                return;
            }

            localStorage.setItem(CLAVE_PASSWORD, nueva);
            form.reset();
            mostrarMensajePassword('Contraseña actualizada correctamente.');
        }

        document.getElementById('form-login').addEventListener('submit', iniciarSesion);
        document.getElementById('form-producto').addEventListener('submit', agregarProducto);
        document.getElementById('form-password').addEventListener('submit', cambiarPassword);
        document.getElementById('btn-salir').addEventListener('click', cerrarSesion);

        actualizarVistaAutenticacion();

    </script>
</body>
</html>
